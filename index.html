<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播報到系統</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #fdfaf5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 80%; max-width: 300px; text-align: center; }
        h2 { color: #8d775f; font-size: 1.2rem; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { background-color: #c2a68a; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 1rem; width: 100%; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>
    <div class="card">
        <h2>請輸入報名手機號碼</h2>
        <input type="tel" id="phone" placeholder="例如: 0912345678">
        <button id="submitBtn" onclick="sendData()">確認報到</button>
    </div>

    <script>
    // 1. 初始化 LIFF (保持原樣，但我們在 sendData 會再確認一次)
    async function main() {
        try {
            await liff.init({ liffId: "2009589067-64QUvzI2" }); 
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        } catch (err) {
            console.error("初始化失敗", err);
        }
    }
    main();

    async function sendData() {
    const btn = document.getElementById('submitBtn');
    const phone = document.getElementById('phone').value;
    const targetUrl = "https://hook.us2.make.com/q75gu89l80ritl1f4ak82lhikbb30ybm";

    alert("第 1 步：開始執行 sendData");

    try {
        alert("第 2 步：準備檢查 LIFF 狀態");
        await liff.ready;
        
        if (!liff.isLoggedIn()) {
            alert("錯誤：尚未登入 LINE，請重新整理網頁");
            liff.login();
            return;
        }

        alert("第 3 步：獲取用戶資料...");
        const profile = await liff.getProfile();
        
        alert("第 4 步：準備發送到 Make.com\n網址：" + targetUrl);

        // 使用傳輸
        fetch(targetUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                phone: phone,
                userId: profile.userId,
                displayName: profile.displayName
            })
        });

        alert("第 5 步：發送指令已發出！即將關閉網頁");
        liff.closeWindow();

    } catch (err) {
        alert("偵測到異常錯誤：\n" + err.message);
        btn.disabled = false;
        btn.innerText = "確認報到";
    }
}
</script>
</body>
</html>
