<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播報到系統</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #fdfaf5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 80%; max-width: 300px; text-align: center; }
        h2 { color: #8d775f; font-size: 1.2rem; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { background-color: #c2a68a; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 1rem; width: 100%; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>
    <div class="card">
        <h2>請輸入報名手機號碼</h2>
        <input type="tel" id="phone" placeholder="例如: 0912345678">
        <button id="submitBtn" onclick="sendData()">確認報到</button>
    </div>

    <script>
        // 初始化 LIFF
        async function main() {
            try {
                await liff.init({ liffId: "2009589067-64QUvzI2" }); 
                if (!liff.isLoggedIn()) {
                    liff.login();
                }
            } catch (err) {
                console.error("LIFF 初始化失敗", err);
            }
        }
        main();

        async function sendData() {
            const phone = document.getElementById('phone').value;
            const btn = document.getElementById('submitBtn');

            if (!/^09\d{8}$/.test(phone)) {
                alert("請輸入正確的手機號碼格式");
                return;
            }

            // 鎖定按鈕防止重複點擊
            btn.disabled = true;
            btn.innerText = "處理中...";

            try {
                const profile = await liff.getProfile();
                
                // 改用 await 確保資料傳出去
                const response = await fetch("https://hook.us2.make.com/q75gu89l80ritl1f4ak82lhikbb30ybm", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        phone: phone,
                        userId: profile.userId,
                        displayName: profile.displayName
                    })
                });

                if (response.ok) {
                    // 成功傳送後，直接關閉
                    liff.closeWindow();
                } else {
                    alert("伺服器回應錯誤，請聯繫店主");
                    btn.disabled = false;
                    btn.innerText = "確認報到";
                }
            } catch (err) {
                alert("傳送失敗，請檢查網路：" + err);
                btn.disabled = false;
                btn.innerText = "確認報到";
            }
        }
    </script>
</body>
</html>
