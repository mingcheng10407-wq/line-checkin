<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播報到系統</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #fdfaf5; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 80%; max-width: 300px; text-align: center; }
        h2 { color: #8d775f; font-size: 1.2rem; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { background-color: #c2a68a; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 1rem; width: 100%; }
        button:disabled { background-color: #ccc; }
    </style>
</head>
<body>
    <div class="card">
        <h2>請輸入報名手機號碼</h2>
        <input type="tel" id="phone" placeholder="例如: 0912345678">
        <button id="submitBtn" onclick="sendData()">確認報到</button>
    </div>

    <script>
    // 1. 初始化 LIFF
    liff.init({ liffId: "2009584460-HUH3UmwG" })
        .then(() => {
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        })
        .catch((err) => {
            console.error("LIFF 啟動失敗", err);
        });

    async function sendData() {
    const phone = document.getElementById('phone').value;
    const btn = document.getElementById('submitBtn');

    // 格式檢查
    if (!/^09\d{8}$/.test(phone)) {
        alert("請輸入正確的手機號碼格式");
        return;
    }

    try {
        await liff.ready;
        const profile = await liff.getProfile();

        btn.disabled = true;
        btn.innerText = "報到處理中...";

        // 1. 同步傳送資料給 Make.com (後台紀錄)
        fetch("https://hook.us2.make.com/q75gu89l80ritl1f4ak82lhikbb30ybm", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                phone: phone,
                userId: profile.userId,
                displayName: profile.displayName
            }),
            keepalive: true 
        });

        // 2. 【核心改動】強制手機幫用戶發送一則訊息給你的官方帳號
        // 這一步會讓用戶出現在你的對話列表裡
        if (liff.isInClient()) { // 確保是在 LINE App 內執行
            await liff.sendMessages([
                {
                    type: 'text',
                    text: '我已完成直播報到！我的電話是：' + phone
                }
            ]);
        }

        // 3. 成功後關閉視窗
        liff.closeWindow();

    } catch (err) {
        console.error(err);
        alert("查無手機號碼，請確認是否正確");
        btn.disabled = false;
        btn.innerText = "確認報到";
    }
}
</script>
</body>
</html>
